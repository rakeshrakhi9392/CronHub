name: Release and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: job-service
            package: '@chronoflow/job-service'
            path: services/job-service
          - service: auth-service
            package: '@chronoflow/auth-service'
            path: services/auth-service
          - service: scheduler-service
            package: '@chronoflow/scheduler-service'
            path: services/scheduler-service
          - service: executor-service
            package: '@chronoflow/executor-service'
            path: services/executor-service
          - service: api-gateway
            package: '@chronoflow/api-gateway'
            path: services/api-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.node-service
          push: true
          build-args: |
            SERVICE_PACKAGE=${{ matrix.package }}
            SERVICE_PATH=${{ matrix.path }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/chrono-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/chrono-${{ matrix.service }}:${{ github.sha }}

  deploy:
    name: Deploy Helm Chart
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_DATA" | base64 -d > ~/.kube/config

      - uses: azure/setup-helm@v4

      - name: Deploy
        run: |
          helm upgrade --install chronoflow helm/chronoflow \
            --namespace chronoflow \
            --create-namespace
