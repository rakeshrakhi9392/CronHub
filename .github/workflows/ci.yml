name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript workspaces
        run: npm run build

      - name: Validate Kubernetes manifests
        run: kubectl kustomize k8s/base >/dev/null

      - name: Validate Helm chart
        run: helm template chronoflow helm/chronoflow >/dev/null
